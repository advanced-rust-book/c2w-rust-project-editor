name: Publish container files

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create at the selected branch HEAD."
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to the tag name."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-container-files-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish container files
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      RELEASE_NAME: ${{ inputs.release_name }}

    steps:
      - name: Check out selected branch
        uses: actions/checkout@v4

      - name: Build container files
        run: docker compose up --build --exit-code-from builder builder

      - name: Stop compose services
        if: always()
        run: docker compose down --remove-orphans

      - name: Stage release assets
        run: |
          set -euo pipefail

          rm -rf release-container-files
          mkdir -p release-container-files

          find docs/containers -maxdepth 1 -type f -exec cp {} release-container-files/ \;

          if [ -f docs/src/c2w-net-proxy.wasm ]; then
            cp docs/src/c2w-net-proxy.wasm release-container-files/
          fi

          if ! find release-container-files -maxdepth 1 -type f | grep -q .; then
            echo "No release assets were generated."
            exit 1
          fi

          (
            cd release-container-files
            checksums="$(mktemp)"
            find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%P\0' \
              | sort -z \
              | xargs -0 sha256sum > "$checksums"
            mv "$checksums" SHA256SUMS.txt
          )

      - name: Upload workflow artifact copy
        uses: actions/upload-artifact@v4
        with:
          name: container-files-${{ inputs.release_tag }}
          path: release-container-files
          if-no-files-found: error
          include-hidden-files: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="${RELEASE_NAME:-$RELEASE_TAG}"
          mapfile -d '' assets < <(find release-container-files -maxdepth 1 -type f -print0 | sort -z)
          gh release create "$RELEASE_TAG" "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "$title" \
            --generate-notes
